<!DOCTYPE html>

<html>
<head>
    <title>Game Night Date Night</title>

<style>
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEARTS */
.heart {
    position: fixed;
    top: -20px;
    left: 0;
    color: white;
    font-size: 14px;
    font-weight: bold;
    transform: scaleX(1.3);
    pointer-events: none;
    z-index: 1;
    opacity: 0.9;
}

.panel {
    position: relative;
    z-index: 2;
    display: inline-block;
    padding: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
}

h1, h2, p {
    text-shadow: 0 0 8px rgba(255,255,255,0.15);
}
</style>

</head>

<body style="
    margin:0;
    color:white;
    font-family:monospace;
    text-align:center;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
">

<div id="hearts"></div>
<div id="screen"></div>

<script>

/* ---------- SOUND EFFECTS ---------- */
function sound(type) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    if (type === "wrong") {
        o.frequency.value = 220;
        g.gain.value = 0.1;
        o.start();
        o.stop(ctx.currentTime + 0.2);
    }

    if (type === "correct") {
        o.frequency.value = 600;
        g.gain.value = 0.1;
        o.start();
        o.stop(ctx.currentTime + 0.15);
    }

    if (type === "win") {
        o.frequency.value = 800;
        g.gain.value = 0.12;
        o.start();
        o.stop(ctx.currentTime + 0.4);
    }
}

/* ---------- HEARTS ---------- */
function spawnHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";

        heart.style.left = Math.random() * 100 + "vw";

        const duration = 4000 + Math.random() * 3000;

        document.body.appendChild(heart);

        heart.animate([
            { transform: "translateY(-10vh) scaleX(1.3)", opacity: 0 },
            { transform: "translateY(50vh) scaleX(1.3)", opacity: 1 },
            { transform: "translateY(120vh) scaleX(1.3)", opacity: 0 }
        ], {
            duration: duration,
            easing: "linear"
        });

        setTimeout(() => heart.remove(), duration);
    }, 120);
}

spawnHearts();

/* ---------- START SCREEN ---------- */
document.getElementById("screen").innerHTML = `
<div class="panel">
<h1>🎮 GAME NIGHT DATE NIGHT 🎮</h1>

<p>Player 1: Leigh</p>
<p>Player 2: Antoine</p>

<p>Objective: Unlock New Relationship Lore</p>

<button onclick="gate()">START GAME</button>
</div>
`;

/* ---------- GATE (FIXED FLOW) ---------- */
function gate() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Identity Check</h2>
        <p>Are you the real Antoine?</p>

        <button onclick="q1()">Yes</button>
        <button onclick="gateFail()">No</button>
    </div>
    `;
}

function gateFail() {
    sound("wrong");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Access Denied</h2>
        <p>Try again.</p>

        <button onclick="gate()">Back</button>
    </div>
    `;
}

/* ---------- Q1 ---------- */
function q1() {
    sound("correct");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 1</h2>
        <p>When did you and Leigh first meet?</p>

        <input id="answer"/>
        <br>
        <button onclick="fail1()">Submit</button>
    </div>
    `;
}

function fail1() {
    sound("wrong");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>WRONG!!</h2>
        <p>She's always "baby" / "my love".. who tf is Leigh??? 🤨🤨🤨</p>

        <button onclick="q2()">Next</button>
    </div>
    `;
}

/* ---------- Q2 ---------- */
function q2() {
    sound("correct");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 2</h2>
        <p>When did she say I love you?</p>

        <input id="answer"/>
        <br>
        <button onclick="fail2()">Submit</button>
    </div>
    `;
}

function fail2() {
    sound("wrong");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>WRONG AGAIN!!</h2>
        <p>(she also doesn't know so you're safe 🤷🏽‍♀️)</p>

        <button onclick="q3()">Next</button>
    </div>
    `;
}

/* ---------- Q3 ---------- */
function q3() {
    sound("correct");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 3</h2>
        <p>What's her favorite flower?</p>

        <input id="answer"/>
        <br>
        <button onclick="finalScreen()">Submit</button>
    </div>
    `;
}

/* ---------- FINAL ---------- */
function finalScreen() {
    sound("win");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>You got it right... but you still lost!!</h2>
        <p>Up for a rematch? 😏</p>

        <button onclick="rematch()">let's gooo</button>
        <button onclick="rematch()">no im weak im gonna cry</button>
    </div>
    `;
}

function rematch() {
    sound("win");

    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Alright loser</h2>
        <p>Click below for your rematch invite:</p>

        <a href="https://calendar.app.google/JJ2WyeGQ7Fx1SSzA8" target="_blank">
            <button>OPEN INVITE</button>
        </a>
    </div>
    `;
}

</script>

</body>
</html>
