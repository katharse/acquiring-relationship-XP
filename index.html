<!DOCTYPE html>

<html>
<head>
    <title>Game Night Date Night</title>

<style>
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* hearts */
.heart {
    position: fixed;
    top: -20px;
    left: 0;
    color: white;
    font-size: 14px;
    font-weight: bold;
    transform: scaleX(1.3);
    pointer-events: none;
    z-index: 1;
    opacity: 0.9;
}

/* TRUE CENTER LAYOUT */
body {
    margin:0;
    color:white;
    font-family:monospace;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

#hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

.panel {
    position: relative;
    z-index: 2;
    display: inline-block;
    padding: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    text-align:center;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
}

input {
    padding: 10px;
    font-size: 14px;
    margin-top: 10px;
}
</style>

</head>

<body>

<div id="hearts"></div>
<div id="screen"></div>

<script>

/* hearts */
function spawnHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";

        heart.style.left = Math.random() * 100 + "vw";

        const duration = 4000 + Math.random() * 3000;

        document.body.appendChild(heart);

        heart.animate([
            { transform: "translateY(-10vh) scaleX(1.3)", opacity: 0 },
            { transform: "translateY(50vh) scaleX(1.3)", opacity: 1 },
            { transform: "translateY(120vh) scaleX(1.3)", opacity: 0 }
        ], {
            duration: duration,
            easing: "linear"
        });

        setTimeout(() => heart.remove(), duration);
    }, 120);
}

spawnHearts();

/* START SCREEN */
document.getElementById("screen").innerHTML = `
<div class="panel">
<h1>🎮 GAME NIGHT DATE NIGHT 🎮</h1>

<p>Player 1: Leigh</p>
<p>Player 2: Antoine</p>

<p>Objective: Unlock New Relationship Lore</p>

<button onclick="gate()">START GAME</button>
</div>
`;

/* GATE */
function gate() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Identity Check</h2>
        <p>Are you the real Antoine?</p>

        <button onclick="q1()">Yes</button>
        <button onclick="gateFail()">No</button>
    </div>
    `;
}

function gateFail() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Access Denied</h2>
        <p>Try again.</p>

        <button onclick="gate()">Back</button>
    </div>
    `;
}

/* Q1 */
function q1() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>If you're Antoine...</h2>
        <p>When did you and Leigh first meet?</p>

        <input id="answer" placeholder="MM/DD/YYYY"/>
        <br>
        <button onclick="fail1()">Submit</button>
    </div>
    `;
}

function fail1() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>WRONG!!</h2>
        <p>She's always "baby" / "my love".. who tf is Leigh??? 🤨🤨🤨</p>

        <button onclick="q2()">Next question</button>
    </div>
    `;
}

/* Q2 */
function q2() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Ok one more chance...</h2>
        <p>When did she first say I love you to you?</p>

        <input id="answer" placeholder="MM/DD/YYYY"/>
        <br>
        <button onclick="fail2()">Submit</button>
    </div>
    `;
}

function fail2() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>WRONG AGAIN!!</h2>
        <p>even she doesn't know so why would you? 🤷🏽‍♀️</p>

        <button onclick="q3()">Next question</button>
    </div>
    `;
}

/* Q3 */
function q3() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>FINAL CHANCE!</h2>
        <p>What is YOUR favorite flower?</p>

        <input id="answer" placeholder="type answer"/>
        <br>
        <button onclick="finalScreen()">Submit</button>
    </div>
    `;
}

/* FINAL */
function finalScreen() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>You got it right... but you still lost!!</h2>
        <p>Up for a rematch? 😏</p>

        <button onclick="rematch()">let's gooo 😤</button>
        <button id="runBtn">no im weak im gonna cry 🥹</button>
    </div>
    `;

    setTimeout(() => {
        const btn = document.getElementById("runBtn");

        if (!btn) return;

        btn.addEventListener("mouseenter", () => {
            btn.style.position = "absolute";
            btn.style.left = Math.random() * 80 + "vw";
            btn.style.top = Math.random() * 80 + "vh";
        });
    }, 50);
}

/* REWARD */
function rematch() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Alright loser</h2>
        <p>Get ready to lose again 😏</p>

        <a href="https://calendar.app.google/B212JrV5JLn1xGuh9" target="_blank">
            <button>Bring it on 😤</button>
        </a>
    </div>
    `;
}

</script>

</body>
</html>
