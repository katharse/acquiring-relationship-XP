</div>

<script>

function spawnHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";

        heart.style.left = Math.random() * 100 + "vw";

        const duration = 4000 + Math.random() * 3000;

        document.body.appendChild(heart);

        heart.animate([
            { transform: "translateY(-10vh)", opacity: 0 },
            { transform: "translateY(50vh)", opacity: 1 },
            { transform: "translateY(120vh)", opacity: 0 }
        ], {
            duration: duration,
            easing: "linear"
        });

        setTimeout(() => heart.remove(), duration);
    }, 200);
}

spawnHearts();

function startGame() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h2>Loading Relationship Data...</h2>
        <p>██████████ 100%</p>
        <p>Analyzing compatibility...</p>
        <p>Result: dangerously high affection levels</p>
        </div>
    `;

    setTimeout(showQuest, 2000);
}

function showQuest() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h1>QUEST UNLOCKED</h1>

        <p>Game Night II: The Lore Expansion Pack</p>
        <p>Do you accept this mission?</p>

        <button onclick="acceptQuest()">ACCEPT</button>
        <button id="noBtn">DECLINE</button>
        </div>
    `;

    setTimeout(() => {
        const noBtn = document.getElementById("noBtn");

        if (!noBtn) return;

        noBtn.addEventListener("mouseenter", () => {
            noBtn.style.position = "absolute";
            noBtn.style.left = Math.random() * 80 + "vw";
            noBtn.style.top = Math.random() * 80 + "vh";
        });
    }, 50);
}

function acceptQuest() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h1>QUEST ACCEPTED 🎉</h1>

        <p>Your reward has been unlocked.</p>

        <a href="https://calendar.app.google/JJ2WyeGQ7Fx1SSzA8">
            <button>ADD TO CALENDAR</button>
        </a>

        </div>
    `;
}

</script>

</body>
