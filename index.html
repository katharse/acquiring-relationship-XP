<style>
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes floatHeart {
    0% {
        transform: translateY(100vh) scale(0.6);
        opacity: 0;
    }
    10% { opacity: 1; }
    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

#hearts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
}

.heart {
    position: fixed;
    color: #ff4d6d;
    font-size: 14px;
    animation: floatHeart 6s linear infinite;
    pointer-events: none;
    z-index: 1;
}

.panel {
    position: relative;
    z-index: 2;
    display: inline-block;
    padding: 30px;

button:hover {

</div>

<script>

function spawnHearts() {
    const heartsContainer = document.getElementById("hearts");

    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.animationDuration = (4 + Math.random() * 3) + "s";

        heartsContainer.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 7000);

    }, 150);
}

spawnHearts();

function startGame() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h2>Loading Relationship Data...</h2>
        <p>██████████ 100%</p>
        <p>Analyzing compatibility...</p>
        <p>Result: dangerously high affection levels</p>
        </div>
    `;

    setTimeout(showQuest, 2500);
}

function showQuest() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h1>QUEST UNLOCKED</h1>

        <p>Game Night II: The Lore Expansion Pack</p>
        <p>Do you accept this mission?</p>

        <button onclick="acceptQuest()">ACCEPT</button>
        <button id="noBtn">DECLINE</button>
        </div>
    `;

    const noBtn = document.getElementById("noBtn");

    noBtn.addEventListener("mouseover", () => {
        noBtn.style.position = "absolute";
        noBtn.style.left = Math.random() * 80 + "vw";
        noBtn.style.top = Math.random() * 80 + "vh";
    });
}

function acceptQuest() {
    document.getElementById("screen").innerHTML = `
        <div class="panel">
        <h1>QUEST ACCEPTED 🎉</h1>

        <p>Your reward has been unlocked.</p>

        <a href="PASTE_YOUR_GOOGLE_CALENDAR_LINK_HERE">
            <button>ADD TO CALENDAR</button>
        </a>

        </div>
    `;
}

</script>

</body>
