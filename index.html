<!DOCTYPE html>

<html>
<head>
    <title>Game Night Date Night</title>

<style>
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Hearts (white + slightly “fat”) */
.heart {
    position: fixed;
    top: -20px;
    left: 0;
    color: white;
    font-size: 14px;
    font-weight: bold;
    transform: scaleX(1.3);
    pointer-events: none;
    z-index: 1;
    opacity: 0.9;
}

#screen {
    position: relative;
    z-index: 2;
    padding-top: 80px;
}

.panel {
    position: relative;
    z-index: 2;
    display: inline-block;
    padding: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
}

button {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 8px;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
}

h1, h2, p {
    text-shadow: 0 0 8px rgba(255,255,255,0.15);
}

input {
    padding: 10px;
    font-size: 14px;
    margin-top: 10px;
}
</style>

</head>

<body style="
    margin:0;
    color:white;
    font-family:monospace;
    text-align:center;
    height:100vh;
    overflow:hidden;
    background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
">

<div id="hearts"></div>
<div id="screen"></div>

<script>

/* HEARTS */
function spawnHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "♥";

        heart.style.left = Math.random() * 100 + "vw";

        const duration = 4000 + Math.random() * 3000;

        document.body.appendChild(heart);

        heart.animate([
            { transform: "translateY(-10vh) scaleX(1.3)", opacity: 0 },
            { transform: "translateY(50vh) scaleX(1.3)", opacity: 1 },
            { transform: "translateY(120vh) scaleX(1.3)", opacity: 0 }
        ], {
            duration: duration,
            easing: "linear"
        });

        setTimeout(() => heart.remove(), duration);
    }, 200);
}

spawnHearts();

/* ENTRY SCREEN */
document.getElementById("screen").innerHTML = `
<div class="panel">
<h1>🎮 GAME NIGHT DATE NIGHT 🎮</h1>

<p>Player 1: Leigh</p>
<p>Player 2: Antoine</p>

<p>Objective: Unlock New Relationship Lore</p>

<button onclick="gateCheck()">START GAME</button>
</div>
`;

/* PRE-SCREEN */
function gateCheck() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Identity Check</h2>
        <p>Are you the real Antoine?</p>

        <button onclick="quizStart()">Yes</button>
        <button onclick="fakeFail()">No</button>
    </div>
    `;
}

function fakeFail() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Access Denied</h2>
        <p>Nice try, impostor.</p>
        <button onclick="gateCheck()">Try Again</button>
    </div>
    `;
}

/* QUIZ SYSTEM */
let step = 0;

function quizStart() {
    step = 0;
    q1();
}

/* Q1 */
function q1() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 1</h2>
        <p>When did you and Leigh first meet?</p>

        <input id="answer" placeholder="MM/DD/YYYY"/>
        <br>
        <button onclick="checkQ1()">Submit</button>
    </div>
    `;
}

function checkQ1() {
    alert("Trick question: she should always be called baby. Who's Leigh??? You failed!!");
    q2();
}

/* Q2 */
function q2() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 2</h2>
        <p>When did she say I love you?</p>

        <input id="answer" placeholder="MM/DD/YYYY"/>
        <br>
        <button onclick="checkQ2()">Submit</button>
    </div>
    `;
}

function checkQ2() {
    alert("lol it's ok even she doesn't know lmao");
    q3();
}

/* Q3 */
function q3() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Question 3</h2>
        <p>What's her favorite flower?</p>

        <input id="answer" placeholder="type your answer"/>
        <br>
        <button onclick="checkQ3()">Submit</button>
    </div>
    `;
}

function checkQ3() {
    const val = document.getElementById("answer").value.toLowerCase();

    if (val === "lilies" || val === "lily") {
        finalFail();
    } else {
        finalFail();
    }
}

/* FINAL SCREEN */
function finalFail() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h1>HAHA LOSER</h1>
        <p>Up for a rematch?</p>

        <button onclick="rematch()">LET'S GOOO</button>
        <button onclick="rematch()">NO I'M WEAK I'M GONNA CRY</button>
    </div>
    `;
}

function rematch() {
    document.getElementById("screen").innerHTML = `
    <div class="panel">
        <h2>Alright loser</h2>
        <p>Click this link to get your invite for the rematch:</p>

        <a href="https://calendar.app.google/JJ2WyeGQ7Fx1SSzA8" target="_blank">
            <button>OPEN INVITE</button>
        </a>
    </div>
    `;
}

</script>

</body>
</html>
